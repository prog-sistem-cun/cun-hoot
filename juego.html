<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUN-hoot | En Juego</title>
    <style>
        :root { --cun-blue: #002b5c; --cun-gold: #d89e00; --cun-light: #f3f7fe; }
        body { font-family: sans-serif; background: var(--cun-light); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--cun-blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-opcion { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .btn-opcion:hover { border-color: var(--cun-gold); background: #fffdf5; }
        .timer { font-weight: bold; font-size: 1.2rem; color: var(--cun-gold); border: 1px solid var(--cun-gold); padding: 5px 10px; border-radius: 5px; }
        #loading { text-align: center; padding: 50px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div><b id="disp-nombre">Cargando...</b></div>
    <div class="timer" id="disp-timer">00:00</div>
</header>

<div id="loading" class="container">
    <h2>Cargando preguntas...</h2>
    <p>Si tarda demasiado, verifica que iniciaste sesión con @cun.edu.co</p>
</div>

<div id="game-container" class="container hidden">
    <h3 id="pregunta-texto">Pregunta</h3>
    <div id="opciones-box"></div>
    <p style="margin-top:20px; color: #666; font-size: 0.8rem;">Pregunta <span id="progreso-txt">0</span> de 20</p>
</div>

<div id="final-container" class="container hidden" style="text-align: center;">
    <h1>¡Terminaste!</h1>
    <p>Tu respuesta ha sido registrada en el sistema.</p>
    <div style="font-size: 3rem; color: var(--cun-gold); margin: 20px 0;" id="final-score">--</div>
    <button onclick="location.href='index.html'" style="padding: 10px 20px; background: var(--cun-blue); color: white; border: none; border-radius: 5px; cursor: pointer;">Salir</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/a/macros/cun.edu.co/s/AKfycbwGL06rkbAkcbGxtrjVuRwAeiDoLF-kp1qcJRUK2yi_J51yJrXaJX2QsVrjSzTrSFqVHQ/exec';
    
    // Extraer datos de la URL que ya recibiste
    const params = new URLSearchParams(window.location.search);
    const estado = {
        token: params.get('token'),
        nombre: params.get('nombre') || 'Estudiante',
        preguntas: [],
        index: 0,
        puntos: 0,
        segundos: 0
    };

    document.getElementById('disp-nombre').innerText = estado.nombre;

    // --- FUNCIÓN CLAVE: JSONP PARA EVITAR CORS ---
    function cargarPreguntas() {
        const script = document.createElement('script');
        // Agregamos un callback para que el servidor responda con una función ejecutable
        script.src = `${SCRIPT_URL}?action=getQuestions&token=${estado.token}&callback=setupGame`;
        script.onerror = () => alert("Error de autenticación. Por favor, abre el link en una ventana de incógnito con tu correo CUN.");
        document.body.appendChild(script);
    }

    // Esta función la llama el script inyectado desde Google
    window.setupGame = function(response) {
        if (!response.ok) {
            alert(response.mensaje);
            return;
        }
        estado.preguntas = response.preguntas;
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        iniciarTimer();
        renderPregunta();
    };

    function renderPregunta() {
        if (estado.index >= estado.preguntas.length) {
            finalizar();
            return;
        }
        const p = estado.preguntas[estado.index];
        document.getElementById('pregunta-texto').innerText = p.pregunta;
        document.getElementById('progreso-txt').innerText = estado.index + 1;
        
        const box = document.getElementById('opciones-box');
        box.innerHTML = '';
        p.opciones.forEach((opc, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opcion';
            btn.innerText = opc;
            btn.onclick = () => enviarRespuesta(i);
            box.appendChild(btn);
        });
    }

    function enviarRespuesta(idx) {
        // Enviar respuesta usando imagen (Beacon térmico) o fetch simple no-cors
        // Para simplificar y asegurar que llegue, usamos fetch modo no-cors
        fetch(`${SCRIPT_URL}?action=respuesta&token=${estado.token}&p=${estado.index}&r=${idx}`, { mode: 'no-cors' });
        
        estado.index++;
        renderPregunta();
    }

    function iniciarTimer() {
        setInterval(() => {
            estado.segundos++;
            const m = Math.floor(estado.segundos / 60).toString().padStart(2,'0');
            const s = (estado.segundos % 60).toString().padStart(2,'0');
            document.getElementById('disp-timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function finalizar() {
        document.getElementById('game-container').classList.add('hidden');
        document.getElementById('final-container').classList.remove('hidden');
        // Intentar obtener puntaje final
        fetch(`${SCRIPT_URL}?action=getPuntaje&token=${estado.token}`)
            .then(r => r.json())
            .then(d => { if(d.ok) document.getElementById('final-score').innerText = d.puntaje; })
            .catch(() => { document.getElementById('final-score').innerText = "Guardado"; });
    }

    // Ejecutar al cargar
    if (!estado.token) {
        alert("Token no encontrado");
        location.href = 'index.html';
    } else {
        cargarPreguntas();
    }
</script>
</body>
</html>
